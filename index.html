  <!-- ============================================
       SPLASH LOADING SCREEN
       Shows immediately while app loads
       ============================================ -->
  <div id="mat-splash" style="
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(135deg, #0c1929 0%, #1a2942 50%, #0c1929 100%);
    z-index: 99999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    transition: opacity 0.5s ease, visibility 0.5s ease;
  ">
    <!-- Runway and Airplane Animation -->
    <div style="position: relative; width: 320px; height: 120px; margin-bottom: 30px;">
      <!-- Runway -->
      <svg viewBox="0 0 320 40" style="position: absolute; bottom: 0; left: 0; width: 100%;">
        <!-- Runway surface -->
        <rect x="0" y="10" width="320" height="25" fill="#2d3748" rx="2"/>
        <!-- Center line dashes -->
        <g stroke="#f7fafc" stroke-width="2" stroke-dasharray="20,15">
          <line x1="10" y1="22" x2="310" y2="22"/>
        </g>
        <!-- Edge lights -->
        <g fill="#48bb78">
          <circle cx="15" cy="10" r="2"/>
          <circle cx="65" cy="10" r="2"/>
          <circle cx="115" cy="10" r="2"/>
          <circle cx="165" cy="10" r="2"/>
          <circle cx="215" cy="10" r="2"/>
          <circle cx="265" cy="10" r="2"/>
          <circle cx="305" cy="10" r="2"/>
        </g>
        <g fill="#48bb78">
          <circle cx="15" cy="35" r="2"/>
          <circle cx="65" cy="35" r="2"/>
          <circle cx="115" cy="35" r="2"/>
          <circle cx="165" cy="35" r="2"/>
          <circle cx="215" cy="35" r="2"/>
          <circle cx="265" cy="35" r="2"/>
          <circle cx="305" cy="35" r="2"/>
        </g>
      </svg>
      
      <!-- Airplane (animated) -->
      <svg id="splash-plane" viewBox="0 0 60 30" style="
        position: absolute;
        bottom: 25px;
        left: -60px;
        width: 60px;
        height: 30px;
        animation: taxiRoll 3s ease-in-out infinite;
      ">
        <!-- Fuselage -->
        <ellipse cx="30" cy="15" rx="25" ry="6" fill="#00d4ff"/>
        <!-- Cockpit -->
        <ellipse cx="50" cy="14" rx="8" ry="5" fill="#63b3ed"/>
        <!-- Wing -->
        <path d="M20 15 L30 5 L40 5 L35 15 Z" fill="#0099cc"/>
        <!-- Tail -->
        <path d="M5 15 L10 5 L15 15 Z" fill="#0099cc"/>
        <!-- Tail fin -->
        <path d="M8 15 L12 8 L12 15 Z" fill="#00d4ff"/>
        <!-- Engine glow -->
        <ellipse cx="8" cy="15" rx="3" ry="2" fill="#f6e05e" opacity="0.8"/>
      </svg>
      
      <!-- Motion blur effect -->
      <div style="
        position: absolute;
        bottom: 30px;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, transparent, rgba(0,212,255,0.3), transparent);
        animation: blurPulse 1.5s ease-in-out infinite;
      "></div>
    </div>
    
    <!-- Title -->
    <h1 style="
      color: #e2e8f0;
      font-size: 28px;
      font-weight: 600;
      margin: 0 0 8px 0;
      letter-spacing: 1px;
      text-shadow: 0 2px 10px rgba(0,212,255,0.3);
    ">Mission Aircrew Toolkit</h1>
    
    <!-- Loading text with dots animation -->
    <div style="
      color: #00d4ff;
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 30px;
    ">
      <span>loading</span><span id="loading-dots" style="display: inline-block; width: 24px; text-align: left;">...</span>
    </div>
    
    <!-- Fun rotating messages -->
    <div id="splash-message" style="
      color: #a0aec0;
      font-size: 13px;
      font-style: italic;
      text-align: center;
      max-width: 300px;
      min-height: 40px;
      line-height: 1.4;
      opacity: 0.9;
    ">Replacing paper charts with pixels...</div>
    
    <!-- CAP Wing badge hint -->
    <div style="
      position: absolute;
      bottom: 30px;
      color: #4a5568;
      font-size: 11px;
    ">Civil Air Patrol Mission Support</div>
  </div>
  
  <style>
    @keyframes taxiRoll {
      0% { 
        left: -60px; 
        transform: translateY(0) rotate(-1deg);
      }
      20% {
        transform: translateY(-2px) rotate(0deg);
      }
      50% { 
        left: 140px;
        transform: translateY(0) rotate(0deg);
      }
      70% {
        transform: translateY(-3px) rotate(2deg);
      }
      85% {
        left: 320px;
        transform: translateY(-8px) rotate(5deg);
      }
      100% { 
        left: 380px; 
        transform: translateY(-20px) rotate(8deg);
      }
    }
    
    @keyframes blurPulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }
  </style>
  
  <script>
    // Rotating splash messages
    (function() {
      const messages = [
        "Replacing paper charts with pixels...",
        "Warming up the weather radar...",
        "Calculating winds aloft...",
        "Tuning into ATIS frequencies...",
        "Checking NOTAMs... so many NOTAMs...",
        "Triangulating ELT signals...",
        "Loading 16,000+ airports...",
        "Briefing the mission crew...",
        "Calibrating the direction finder...",
        "Syncing with ForeFlight... just kidding!",
        "Plotting search patterns...",
        "Checking TFRs... please not another stadium...",
        "Converting coordinates to MGRS...",
        "Inflating the rescue balloons...",
        "Filing the flight plan mentally...",
        "Spinning up the gyros...",
        "Requesting clearance from ATC...",
        "Verifying squawk codes...",
        "Computing density altitude...",
        "Locating the nearest FBO coffee..."
      ];
      
      let msgIndex = 0;
      const msgEl = document.getElementById('splash-message');
      const dotsEl = document.getElementById('loading-dots');
      
      // Rotate messages every 2.5 seconds
      setInterval(() => {
        if (msgEl) {
          msgEl.style.opacity = '0';
          setTimeout(() => {
            msgIndex = (msgIndex + 1) % messages.length;
            msgEl.textContent = messages[msgIndex];
            msgEl.style.opacity = '0.9';
          }, 200);
        }
      }, 2500);
      
      // Animate loading dots
      let dots = 0;
      setInterval(() => {
        if (dotsEl) {
          dots = (dots + 1) % 4;
          dotsEl.textContent = '.'.repeat(dots) + '\u00A0'.repeat(3 - dots);
        }
      }, 400);
      
      // Add transition for message fade
      if (msgEl) {
        msgEl.style.transition = 'opacity 0.2s ease';
      }
    })();
    
    // Hide splash when app is ready
    window.hideSplash = function() {
      const splash = document.getElementById('mat-splash');
      if (splash) {
        splash.style.opacity = '0';
        splash.style.visibility = 'hidden';
        setTimeout(() => {
          splash.remove();
        }, 500);
      }
    };
    
    // Fallback: hide after 15 seconds max (in case app fails to call hideSplash)
    setTimeout(() => {
      window.hideSplash();
    }, 15000);
  </script>

const [activeRefSection, setActiveRefSection] = useState("radioFrequencies");

      if (!logEntry) return;
      
      // Add to weatherBriefings for PDF export
      setWeatherBriefings(prev => [...prev, logEntry]);

    // Import KML/KMZ file function (moved outside renderEltAssistTab for demo module access)
    const importKmlKmz = async (file) => {
      try {
        let kmlText;
        
        if (file.name.toLowerCase().endsWith('.kmz')) {
          // KMZ is a zipped KML - use JSZip via CDN
          const arrayBuffer = await file.arrayBuffer();
          const JSZip = window.JSZip;
          if (!JSZip) {
            alert('Loading JSZip library... Please try again in a moment.');
            // Dynamically load JSZip
            const script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
            document.head.appendChild(script);
            return;
          }
          const zip = await JSZip.loadAsync(arrayBuffer);
          const kmlFile = zip.file(/\.kml$/i)[0];
          if (!kmlFile) {
            alert('No KML file found in KMZ archive');
            return;
          }
          kmlText = await kmlFile.async('text');
        } else {
          // Plain KML file
          kmlText = await file.text();
        }
        
        // Parse KML
        const parser = new DOMParser();
        const kml = parser.parseFromString(kmlText, 'text/xml');
        
        // Find all Placemarks with D_Sol style (detection points)
        const placemarks = kml.querySelectorAll('Placemark');
        const imported = [];
        
        placemarks.forEach((pm, idx) => {
          const styleUrl = pm.querySelector('styleUrl');
          if (!styleUrl) return;
          
          // Only process detection points (D_Sol) not rings (R_RINGS)
          const style = styleUrl.textContent;
          if (!style.includes('D_Sol') && !style.includes('Sol0')) return;
          if (style.includes('R_RINGS')) return;
          
          // Get coordinates
          const point = pm.querySelector('Point coordinates');
          if (!point) return;
          
          const coords = point.textContent.trim().split(',');
          if (coords.length < 2) return;
          
          const lon = parseFloat(coords[0]);
          const lat = parseFloat(coords[1]);
          
          // Get extended data
          let detectTime = '';
          let errorNm = '';
          let msgNum = '';
          
          const dataElements = pm.querySelectorAll('ExtendedData Data');
          dataElements.forEach(d => {
            const name = d.getAttribute('name');
            const value = d.querySelector('value');
            if (!value) return;
            
            if (name === 'DETECT TIME') {
              detectTime = value.textContent.trim().replace('Z', '');
            } else if (name === 'ERROR') {
              // Parse "011 NM" format
              const match = value.textContent.match(/(\d+)/);
              if (match) errorNm = match[1];
            } else if (name === 'USMCC MESSAGE NUMBER') {
              msgNum = value.textContent.trim();
            }
          });
          
          // Get timestamp if available
          const timestamp = pm.querySelector('TimeStamp when');
          if (timestamp && !detectTime) {
            const ts = timestamp.textContent;
            const match = ts.match(/T(\d{2}):(\d{2})/);
            if (match) {
              detectTime = match[1] + match[2];
            }
          }
          
          // Convert to DDM
          const latDdm = gpsUtils.ddToDdm(lat);
          const lonDdm = gpsUtils.ddToDdm(Math.abs(lon));
          
          eltObsSeqRef.current = (eltObsSeqRef.current || 0) + 1;
          
          imported.push({
            id: Date.now() + Math.random() + idx,
            obsNum: eltObsSeqRef.current,
            timeZ: detectTime || '',
            source: 'sarsat',
            latDeg: latDdm.deg.toString(),
            latMin: latDdm.min.toFixed(3),
            lonDeg: lonDdm.deg.toString(),
            lonMin: lonDdm.min.toFixed(3),
            altMSL: '',
            altAGL: '30000', // Satellite detection - high altitude
            strength: 5,
            directRange: errorNm || '',
            rangeAccuracy: errorNm ? (parseFloat(errorNm) * 0.3).toFixed(1) : '', // 30% uncertainty
            dfBearing: '',
            bearingRef: 'TRUE',
            bearingAccuracy: '20',
            notes: `SARSAT Import${msgNum ? ' - MSG#' + msgNum : ''}`,
            useInCalc: true
          });
        });
        
        if (imported.length === 0) {
          alert('No valid ELT detection points found in file');
          return;
        }
        
        // Add to observations
        setEltObservations([...imported, ...eltObservations]);
        alert(`Imported ${imported.length} ELT detection points from ${file.name}`);
        
      } catch (err) {
        console.error('KML import error:', err);
        alert('Error importing file: ' + err.message);
      }
    };
    
    // Import ADS-B track from FlightAware KML (moved outside renderEltAssistTab for demo module access)
    const importAdsbTrack = async (file) => {
      try {
        const kmlText = await file.text();
        const parser = new DOMParser();
        const kml = parser.parseFromString(kmlText, 'text/xml');
        
        // Find gx:Track element
        const track = kml.querySelector('Track') || kml.getElementsByTagName('gx:Track')[0];
        if (!track) {
          alert('No flight track found in KML file');
          return;
        }
        
        // Extract timestamps
        const whenElements = track.querySelectorAll('when') || track.getElementsByTagName('when');
        const times = Array.from(whenElements).map(w => w.textContent.trim());
        
        // Extract coordinates (gx:coord format: lon lat alt)
        const coordElements = track.querySelectorAll('coord') || track.getElementsByTagName('gx:coord');
        const coords = Array.from(coordElements).map(c => {
          const parts = c.textContent.trim().split(/\s+/);
          return {
            lon: parseFloat(parts[0]),
            lat: parseFloat(parts[1]),
            alt: parseFloat(parts[2]) || 0
          };
        });
        
        if (coords.length === 0) {
          alert('No track coordinates found in file');
          return;
        }
        
        // Get aircraft ID from Placemark name
        const placemarkName = kml.querySelector('Placemark n, Placemark name');
        const aircraftId = placemarkName ? placemarkName.textContent.trim() : 'Unknown';
        
        // Get departure airport
        const depPlacemark = Array.from(kml.querySelectorAll('Placemark')).find(p => {
          const name = p.querySelector('n, name');
          return name && name.textContent.includes('Airport') && !name.textContent.includes('INVALID');
        });
        const departureAirport = depPlacemark ? depPlacemark.querySelector('n, name').textContent.replace(' Airport', '') : '';
        
        // Build track data
        const trackData = {
          aircraftId,
          departureAirport,
          importTime: new Date().toISOString(),
          points: coords.map((c, i) => ({
            time: times[i] || '',
            lat: c.lat,
            lon: c.lon,
            altM: c.alt,
            altFt: Math.round(c.alt * 3.28084)
          }))
        };
        
        // Calculate last known heading and speed
        if (trackData.points.length >= 2) {
          const p1 = trackData.points[trackData.points.length - 2];
          const p2 = trackData.points[trackData.points.length - 1];
          
          // Calculate bearing
          const lat1 = p1.lat * Math.PI / 180;
          const lat2 = p2.lat * Math.PI / 180;
          const dLon = (p2.lon - p1.lon) * Math.PI / 180;
          const y = Math.sin(dLon) * Math.cos(lat2);
          const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
          trackData.lastHeading = ((Math.atan2(y, x) * 180 / Math.PI) + 360) % 360;
          
          // Calculate groundspeed
          if (p1.time && p2.time) {
            const t1 = new Date(p1.time);
            const t2 = new Date(p2.time);
            const dtHours = (t2 - t1) / 3600000;
            
            // Haversine distance
            const R = 3440.065; // NM
            const dLat = (p2.lat - p1.lat) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon/2)**2;
            const dist = 2 * R * Math.asin(Math.sqrt(a));
            
            trackData.lastGroundspeed = dtHours > 0 ? Math.round(dist / dtHours) : 0;
          }
          
          trackData.lastPosition = p2;
          trackData.lastTime = p2.time;
        }
        
        setAdsbTrack(trackData);
        alert(`Imported ADS-B track: ${aircraftId}\n${trackData.points.length} position reports\nLast position: ${trackData.lastPosition?.lat.toFixed(4)}°N, ${Math.abs(trackData.lastPosition?.lon).toFixed(4)}°W\nLast heading: ${trackData.lastHeading?.toFixed(0)}°\nGroundspeed: ${trackData.lastGroundspeed} kts`);
        
      } catch (err) {
        console.error('ADS-B import error:', err);
        alert('Error importing ADS-B file: ' + err.message);
      }
    };

    // Parse KML/KMZ files - enhanced version using MAT_IMPORT module

    const parseKML = (kmlText) => {
      // Use MAT_IMPORT for comprehensive parsing
      if (typeof MAT_IMPORT !== 'undefined') {
        const result = MAT_IMPORT.parseKML(kmlText);
        
        // Extract callsign and coordinates from tracks (FlightAware format)
        let callsign = 'Unknown';
        let coordinates = [];
        
        if (result.tracks && result.tracks.length > 0) {
          const track = result.tracks[0];
          callsign = track.name || 'Unknown';
          coordinates = track.coordinates.map(c => ({
            lon: c.lon,
            lat: c.lat,
            alt: c.alt || 0,
            time: c.time || null
          }));
        }
        
        // Return backward-compatible format with extended data
        return { 
          callsign, 
          coordinates,
          // Extended data from MAT_IMPORT
          waypoints: result.waypoints || [],
          polygons: result.polygons || [],
          routes: result.routes || [],
          tracks: result.tracks || [],
          source: result.source,
          full: result
        };
      }
      
      // Fallback to original implementation if MAT_IMPORT not loaded
      const parser = new DOMParser();
      const doc = parser.parseFromString(kmlText, "text/xml");
      
      // Get callsign from track name
      const trackPlacemark = Array.from(doc.getElementsByTagName('Placemark')).find(p => {
        return p.getElementsByTagName('gx:Track').length > 0;
      });
      
      let callsign = 'Unknown';
      if (trackPlacemark) {
        const nameEl = trackPlacemark.getElementsByTagName('n')[0] || trackPlacemark.getElementsByTagName('name')[0];
        if (nameEl) callsign = nameEl.textContent;
      }
      
      // Get coordinates
      const coords = [];
      const gxCoords = doc.getElementsByTagNameNS('http://www.google.com/kml/ext/2.2', 'coord');
      const whenElements = doc.getElementsByTagName('when');
      
      for (let i = 0; i < gxCoords.length; i++) {
        const parts = gxCoords[i].textContent.trim().split(/\s+/);
        if (parts.length >= 2) {
          coords.push({
            lon: parseFloat(parts[0]),
            lat: parseFloat(parts[1]),
            alt: parts[2] ? parseFloat(parts[2]) : 0,
            time: whenElements[i] ? whenElements[i].textContent : null
          });
        }
      }
      
      return { callsign, coordinates: coords, waypoints: [], polygons: [], routes: [], tracks: [] };
    };
